name: E2E (Playwright) on demand

# Manual only — press "Run workflow" in the Actions tab, or:
#   gh workflow run e2e-on-demand.yml
#   gh workflow run e2e-on-demand.yml -f projects=chromium
#   gh workflow run e2e-on-demand.yml -f base_url=https://ainsworth.dev
on:
  workflow_dispatch:
    inputs:
      projects:
        description: 'Which Playwright projects to run'
        required: false
        default: all
        type: choice
        options:
          - all
          - api
          - visual
          - chromium
          - firefox
          - webkit
          - mobile-chrome
          - mobile-safari
      base_url:
        description: 'Test an existing URL instead (blank = build this ref and test it on the runner)'
        required: false
        type: string
      update_snapshots:
        description: 'Rewrite visual baselines and upload them (Linux ones cannot be generated on macOS)'
        required: false
        default: false
        type: boolean

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E (${{ inputs.projects }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SKIP_CV: '1'
      # Cloudflare's published always-passes test keys (see .env.example). Not
      # secrets — they only exist so the widget renders instead of warning.
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: '1x00000000000000000000AA'
      TURNSTILE_SECRET_KEY: '1x0000000000000000000000000000000AA'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resolve Playwright version
        id: playwright
        # Cache on the resolved version, never the range in package.json — a
        # caret bump would otherwise restore browsers for the wrong release.
        run: |
          echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        # The binaries are cached but the OS packages they link against are not
        # part of the runner image.
        run: npx playwright install-deps

      - name: Generate version file
        run: npm run generate-version

      - name: Production build
        # Skipped when testing a URL that is already deployed. Building against
        # a production build rather than `next dev` also avoids the on-demand
        # compile races that make the dev server flaky.
        if: inputs.base_url == ''
        run: npm run build-only

      - name: Run Playwright
        env:
          # Empty is falsy in playwright.config.ts, which then falls back to
          # localhost:3000 and starts the server itself.
          PLAYWRIGHT_BASE_URL: ${{ inputs.base_url }}
          PLAYWRIGHT_SKIP_WEBSERVER: ${{ inputs.base_url != '' && '1' || '' }}
          PLAYWRIGHT_WEB_COMMAND: npx next start
        run: |
          args=()
          if [ "${{ inputs.projects }}" != "all" ]; then
            args+=("--project=${{ inputs.projects }}")
          fi
          if [ "${{ inputs.update_snapshots }}" = "true" ]; then
            args+=("--update-snapshots")
          fi
          npx playwright test "${args[@]}"

      - name: Upload regenerated visual baselines
        # Screenshot baselines are per-platform. There is no Linux machine in
        # the loop locally, so this is how the -linux PNGs get produced: run
        # with update_snapshots, download this artifact, commit the contents.
        if: ${{ inputs.update_snapshots && !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: visual-baselines
          path: e2e/visual/**/*.png
          retention-days: 7

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload failure traces and video
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14
